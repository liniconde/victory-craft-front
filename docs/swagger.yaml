    VideoScoutingProfileCreateRequest:
      type: object
      additionalProperties: false
      description: |
        Request para crear metadata editorial de scouting sobre un video de library.
        El jugador base se resuelve desde `playerProfile`; este request solo acepta metadata editorial
        y el estado de publicación.

        `publicationStatus` es opcional y por compatibilidad el backend crea el perfil como `published`
        si no se envía.

        Para publicar (`published`) el backend exige como mínimo:
        `playerProfileId`, `title`, `sportType`, `playType`, `tournamentType`, `tournamentName`, `recordedAt`.
      required:
        - playerProfileId
        - title
        - sportType
        - playType
        - tournamentType
        - tournamentName
        - recordedAt
      properties:
        playerProfileId: { type: string }
        publicationStatus:
          type: string
          enum: [draft, published, archived]
        title: { type: string }
        sportType: { type: string }
        playType: { type: string }
        tournamentType: { type: string }
        playerAge: { type: integer, minimum: 0, maximum: 100 }
        jerseyNumber: { type: integer, minimum: 0, maximum: 99 }
        tournamentName: { type: string }
        notes: { type: string }
        tags:
          type: array
          items: { type: string }
        recordedAt:
          type: string
          format: date-time

    VideoScoutingProfileUpdateRequest:
      description: |
        Actualización parcial de un scouting profile. Solo acepta metadata editorial, `playerProfileId`
        y `publicationStatus`. Si el resultado final queda como `published`, el backend valida que
        el scouting profile conserve todos los mínimos editoriales requeridos.
      allOf:
        - $ref: "#/components/schemas/VideoScoutingProfileCreateRequest"

