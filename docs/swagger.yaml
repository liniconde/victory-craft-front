  /videos/{id}/analyzeAgent:
    post:
      tags: [Videos]
      summary: Crear job de analisis con worker-agent externo
      description: >
        Construye el evento `video.analysis.requested`, lo valida con zod y lo publica
        en la cola SQS del worker-agent externo. Este flujo esta pensado para
        analisis avanzados orquestados por un agente con tools externas, incluyendo
        procesamiento mas robusto en Python y generacion de artefactos o videos
        derivados. La respuesta incluye los ids de correlacion para seguimiento
        end-to-end desde frontend o backend.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del video de biblioteca o de campo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeAgentVideoJobRequest"
            examples:
              e2e:
                summary: Ejemplo real de prueba E2E
                value:
                  analysisType: agent_prompt
                  prompt: Descarga el video desde S3, ejecuta render de detecciones YOLO con color de camiseta, genera un archivo JSON de estadísticas, sube los artifacts a S3 y analiza los artifacts generados para resumir si el procesamiento fue correcto y si hay hallazgos.
                  maxAttempts: 5
                  outputS3Prefix: video-analysis-results/agent-e2e-001
                  localJobDir: /tmp/video-analysis/agent-e2e-001
                  render:
                    toolName: video.worker.render_yolo_boxes_with_jersey_color
                    outputDir: /tmp/video-analysis/agent-e2e-001/out
                    yoloModel: yolov8n.pt
                    processFps: 5
                    conf: 0.25
                  stats:
                    toolName: video.generate_stats_json
                    outputPath: /tmp/video-analysis/agent-e2e-001/out/stats.json
                  upload:
                    toolName: video.upload_artifacts_to_s3
                    bucket: victory-craft
                    destinationPrefix: video-analysis-results/agent-e2e-001
                  analysis:
                    toolName: video.analyze_generated_artifacts
                    analysisPrompt: Resume si los artefactos fueron generados correctamente y si hay hallazgos.
      responses:
        "201":
          description: Job agent creado y publicado en SQS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeAgentVideoJobResponse"
              examples:
                queued:
                  summary: Respuesta real de job encolado
                  value:
                    message: Agent analysis job created and queued
                    job:
                      _id: 69adc6d72347dffa88e7fa00
                      videoId: 67e48d85ebfc561722a57a22
                      analysisType: agent_prompt
                      status: queued
                      input:
                        prompt: Descarga el video desde S3, ejecuta render de detecciones YOLO con color de camiseta, genera un archivo JSON de estadísticas, sube los artifacts a S3 y analiza los artifacts generados para resumir si el procesamiento fue correcto y si hay hallazgos.
                      createdAt: "2026-03-08T18:58:31.202Z"
                      updatedAt: "2026-03-08T18:58:31.737Z"
                      sqsMessageId: 0bb58429-2601-4abb-90a4-f5e6e1c88b66
                      workerCorrelationId: 69adc6d72347dffa88e7fa00
                      workerEventId: 6b08456e-a1d7-4b0a-a11f-b48350548093
                      workerIdempotencyKey: victorycraft:video.analysis.requested:67e48d85ebfc561722a57a22:v1
