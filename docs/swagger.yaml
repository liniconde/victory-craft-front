      description: >
        Retorna el ranking paginado de videos de biblioteca. El orden se resuelve en backend
        antes de paginar para mantener resultados estables y consistentes entre paginas.
      parameters:
        - in: query
          name: sportType
          schema: { type: string }
        - in: query
          name: playType
          schema: { type: string }
        - in: query
          name: country
