        - in: query
          name: playerCategory
          schema: { type: string }
        - in: query
          name: tournamentName
          schema: { type: string }
        - in: query
          name: searchTerm
          schema: { type: string }
        - in: query
          name: sortBy
          description: >
            Criterio de orden. `score` ordena por `ranking.score` descendente y desempata por
            `video.uploadedAt` descendente. `recent` ordena por fecha mas reciente primero.
            `upvotes` ordena por `ranking.upvotes` descendente y desempata por `video.uploadedAt`
            descendente.
          schema:
            type: string
