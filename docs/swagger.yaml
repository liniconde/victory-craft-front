openapi: 3.0.3
info:
  title: Victory Craft Backend API
  version: 1.0.0
  description: >
    Contrato OpenAPI del microservicio de Victory Craft para gestion de
    usuarios, campos deportivos (football, tennis, padel), slots, reservas,
    videos, imagenes y estadisticas.
servers:
  - url: http://localhost:5001
    description: Local
tags:
  - name: System
  - name: Users
  - name: Fields
  - name: Slots
  - name: Reservations
  - name: Videos
  - name: Video Stats
  - name: Tournaments
  - name: Streaming
  - name: Images
  - name: Concerts
  - name: Workers
  - name: Agent Planning
paths:
  /healthz:
    get:
      tags: [System]
      summary: Healthcheck de la API
      responses:
        "200":
          description: API operativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /users:
    get:
      tags: [Users]
      summary: Listar usuarios
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{id}:
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Users]
      summary: Actualizar usuario
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Users]
      summary: Eliminar usuario
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Usuario eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/register:
    post:
      tags: [Users]
      summary: Registrar usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterRequest"
      responses:
        "201":
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/login:
    post:
      tags: [Users]
      summary: Iniciar sesion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginRequest"
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/oauth2/google:
    get:
      tags: [Users]
      summary: Iniciar OAuth 2.0 con Google
      parameters:
        - in: query
          name: redirect_uri
          required: true
          schema:
            type: string
            format: uri
        - in: query
          name: return_to
          required: false
          schema:
            type: string
            default: /
      responses:
        "302":
          description: Redireccion a Google OAuth consent screen
        "400":
          description: redirect_uri no permitido o configuracion invalida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/oauth2/google/callback:
    get:
      tags: [Users]
      summary: Callback OAuth 2.0 de Google
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redireccion al frontend con token o error
        "400":
          description: Error en callback OAuth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fields:
    get:
      tags: [Fields]
      summary: Listar campos deportivos
      responses:
        "200":
          description: Lista de campos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Field"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Fields]
      summary: Crear campo deportivo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldInput"
      responses:
        "201":
          description: Campo creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"
        "400":
          $ref: "#/components/responses/BadRequest"

  /fields/{id}:
    get:
      tags: [Fields]
      summary: Obtener campo por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Campo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Fields]
      summary: Actualizar campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldUpdateRequest"
      responses:
        "200":
          description: Campo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Fields]
      summary: Eliminar campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Campo eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /fields/users/{userId}:
    get:
      tags: [Fields]
      summary: Listar campos por usuario propietario
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista de campos del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Field"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /fields/{id}/slots:
    get:
      tags: [Fields]
      summary: Listar slots del campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Slots del campo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"

  /fields/{id}/videos:
    get:
      tags: [Fields]
      summary: Listar videos del campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Videos del campo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldVideo"
        "500":
          $ref: "#/components/responses/InternalError"

  /slots:
    get:
      tags: [Slots]
      summary: Listar todos los slots
      responses:
        "200":
          description: Lista de slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Slots]
      summary: Crear slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlotInput"
      responses:
        "201":
          description: Slot creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"

  /slots/{id}:
    get:
      tags: [Slots]
      summary: Obtener slot por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Slots]
      summary: Actualizar slot
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlotUpdateRequest"
      responses:
        "200":
          description: Slot actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Slots]
      summary: Eliminar slot
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Slot eliminado
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /slots/{id}/field:
    get:
      tags: [Slots]
      summary: Listar slots por field ID
      description: >
        En esta ruta, `id` representa el ID del campo (fieldId), aunque el
        parametro se llame `id`.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Lista de slots para el campo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"

  /reservations:
    get:
      tags: [Reservations]
      summary: Listar reservas
      responses:
        "200":
          description: Lista de reservas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Reservations]
      summary: Crear reserva
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationInput"
      responses:
        "201":
          description: Reserva creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "500":
          $ref: "#/components/responses/InternalError"

  /reservations/{id}:
    get:
      tags: [Reservations]
      summary: Obtener reserva por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Reserva
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Reservations]
      summary: Actualizar reserva
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationUpdateRequest"
      responses:
        "200":
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Reservations]
      summary: Eliminar reserva
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Reserva eliminada
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /reservations/user/{id}:
    get:
      tags: [Reservations]
      summary: Listar reservas por usuario
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Reservas del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos:
    post:
      tags: [Videos]
      summary: Crear registro de video asociado a campo/slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoCreateRequest"
      responses:
        "201":
          description: Video creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/library:
    get:
      tags: [Videos]
      summary: Listar videos de biblioteca (paginado)
      description: >
        Devuelve items livianos para listado con URL firmada de reproduccion.
        Si `searchTerm` viene, filtra globalmente antes de paginar por `s3Key` (contains
        case-insensitive) y por coincidencia en `_id` convertido a string.
        Tambien permite filtrar por `sportType`.
        Ejemplo: `/videos/library?page=1&limit=20&searchTerm=padel&sportType=football`.
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: searchTerm
          required: false
          schema:
            type: string
          description: Texto de busqueda global (se aplica antes de paginar)
        - in: query
          name: sportType
          required: false
          schema:
            type: string
            enum: [football, futsal, basketball, baseball, volleyball, tennis, padel, other]
          description: Filtra por tipo de deporte del video
        - in: query
          name: mine
          required: false
          schema:
            type: boolean
            default: false
          description: Si es `true`, limita el listado a videos del usuario autenticado
      responses:
        "200":
          description: Lista paginada de videos de biblioteca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoLibraryPaginatedResponse"
              examples:
                filtered:
                  summary: Ejemplo con filtro por nombre
                  value:
                    items:
                      - _id: "67ed8f71cf3e27c5fe0ce245"
                        s3Key: "videoPadelTest.mp4"
                        sportType: "padel"
                        uploadedAt: "2025-04-02T19:26:41.417Z"
                        ownerUserId: "67ed8f71cf3e27c5fe0ce246"
                        videoUrl: "https://victory-craft.s3.amazonaws.com/videoPadelTest.mp4?X-Amz-..."
                    pagination:
                      page: 1
                      limit: 20
                      total: 1
                      totalPages: 1
                      hasNextPage: false
                      hasPrevPage: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Videos]
      summary: Crear registro de video para biblioteca (sin cancha)
      description: >
        Si la request llega autenticada, el backend asigna `ownerUserId` al video para
        habilitar flujos de "mis videos" y asociaciones a player profiles. Si no llega
        autenticada, el comportamiento previo se mantiene y el owner puede quedar vacio.
        `sportType` se normaliza internamente y usa como catalogo oficial:
        `football`, `futsal`, `basketball`, `baseball`, `volleyball`, `tennis`, `padel`, `other`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoLibraryCreateRequest"
      responses:
        "201":
          description: Video de biblioteca creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/library/mine:
    get:
      tags: [Videos]
      summary: Listar solo los videos de biblioteca del usuario autenticado
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: searchTerm
          schema:
            type: string
        - in: query
          name: sportType
          schema:
            type: string
            enum: [football, futsal, basketball, baseball, volleyball, tennis, padel, other]
      responses:
        "200":
          description: Lista paginada de videos propios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoLibraryPaginatedResponse"
              examples:
                mine:
                  value:
                    items:
                      - _id: "67ed8f71cf3e27c5fe0ce245"
                        s3Key: "my-highlight.mp4"
                        sportType: "football"
                        uploadedAt: "2026-03-18T09:00:00.000Z"
                        ownerUserId: "67ed8f71cf3e27c5fe0ce246"
                        videoUrl: "https://signed.example.com/my-highlight.mp4"
                    pagination:
                      page: 1
                      limit: 20
                      total: 1
                      totalPages: 1
                      hasNextPage: false
                      hasPrevPage: false
        "401":
          description: Token requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/library/{videoId}/scouting-profile:
    post:
      tags: [Videos]
      summary: Crear perfil de scouting para un video de biblioteca
      description: |
        Crea la metadata editorial usada para publicar un video en rankings de scouting.
        El video debe estar previamente vinculado a un `playerProfile` mediante
        `POST /recruiters/player-profiles/{profileId}/videos`.

        `publicationStatus` controla si el video aparece en ranking:
        - `published`: visible en ranking
        - `draft`: borrador no visible en ranking
        - `archived`: retirado del ranking sin borrar metadata
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoScoutingProfileCreateRequest"
            examples:
              create:
                value:
                  playerProfileId: "67ed8f71cf3e27c5fe0ce248"
                  publicationStatus: "published"
                  title: "Highlights U17"
                  sportType: "football"
                  playType: "attacking_transition"
                  tournamentType: "league"
                  playerAge: 17
                  jerseyNumber: 11
                  tournamentName: "Madrid Youth League"
                  notes: "Strong 1v1 profile"
                  tags: ["speed", "duels", "transition"]
                  recordedAt: "2026-03-15T10:00:00.000Z"
              minimalWithPlayerProfile:
                value:
                  playerProfileId: "67ed8f71cf3e27c5fe0ce248"
                  publicationStatus: "published"
                  title: "Gol en transición ofensiva"
                  sportType: "football"
                  playType: "attacking_transition"
                  tournamentType: "league"
                  tournamentName: "Madrid Youth League"
                  recordedAt: "2026-03-15T10:00:00.000Z"
                  notes: "Ataque rápido con buena toma de decisión"
                  tags: ["transition", "finishing"]
      responses:
        "201":
          description: Perfil de scouting creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoScoutingProfileEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Token requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No autorizado para crear perfil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Ya existe perfil para este video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [Videos]
      summary: Obtener perfil de scouting por video
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Perfil de scouting encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoScoutingProfileEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Videos]
      summary: Actualizar perfil de scouting por video
      description: |
        Actualiza la metadata editorial del video publicado en scouting.
        El video debe seguir vinculado a un `playerProfile` valido.

        También puede cambiar `publicationStatus` para publicar, dejar en borrador o retirar un video del ranking
        sin borrar su scouting profile.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoScoutingProfileUpdateRequest"
      responses:
        "200":
          description: Perfil de scouting actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  scoutingProfile:
                    $ref: "#/components/schemas/VideoScoutingProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Token requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No autorizado para actualizar perfil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/library/{videoId}/votes:
    post:
      tags: [Videos]
      summary: Crear o actualizar voto del usuario autenticado
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoVoteUpsertRequest"
            examples:
              upvote:
                value:
                  value: 1
      responses:
        "200":
          description: Voto aplicado y resumen actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoVoteUpsertResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Token requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/library/{videoId}/votes/me:
    delete:
      tags: [Videos]
