            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: demo_frontend
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "202":
          description: Solicitud de arranque encolada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Workers start request queued
                  queueUrl:
                    type: string
                    example: https://sqs.us-east-1.amazonaws.com/123456789012/workers-start
                  messageId:
                    type: string
                  payload:
                    type: object
                    additionalProperties: true
