      tags: [Images]
      summary: Generar URL firmada para descargar imagen de S3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectKeyRequest"
      responses:
        "200":
          description: URL firmada de descarga
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3DownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /concerts:
    get:
      tags: [Concerts]
      summary: Listar conciertos
      responses:
        "200":
          description: Lista de conciertos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Concert"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Concerts]
      summary: Crear concierto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConcertInput"
      responses:
        "201":
          description: Concierto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Concert"
        "400":
          $ref: "#/components/responses/BadRequest"

  /agent/plan:
    post:
      tags: [Agent Planning]
      summary: Planificar acciones frontend con LLM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentPlanRequest"
      responses:
        "200":
          description: Plan de acciones normalizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPlanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Error del proveedor LLM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /agent/v2/plan:
    post:
      tags: [Agent Planning]
      summary: Planificar acciones frontend con catalogo de navegacion, cache y fallback LLM
      description: >
        Version optimizada del planner. Intenta resolver navegacion frecuente de forma
        deterministica usando un catalogo compacto enviado por frontend o previamente
        sincronizado. Solo llama al LLM cuando hay ambiguedad real. La respuesta incluye
        metadata de cache, confianza y trazabilidad.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentPlanV2Request"
      responses:
        "200":
          description: Plan de acciones optimizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPlanV2Response"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Error del proveedor LLM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /agent/v2/navigation-catalogs/{version}:
    put:
      tags: [Agent Planning]
      summary: Registrar o actualizar un catalogo de navegacion
      description: >
        Guarda el catalogo de navegacion compacto generado por frontend para una version
        concreta. Al actualizar una version, el backend invalida automaticamente la cache
        asociada a esa version para evitar rutas antiguas.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: version
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NavigationCatalogUpsertRequest"
      responses:
        "200":
          description: Catalogo guardado e invalidacion aplicada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavigationCatalogUpsertResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Rol no autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /agent/v2/cache/invalidate:
    post:
      tags: [Agent Planning]
      summary: Invalidar cache global del planner v2
      description: >
        Permite borrar toda la cache, solo una version de catalogo o una pregunta concreta
        ya normalizada por el backend.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentPlanCacheInvalidateRequest"
      responses:
        "200":
          description: Cache invalidada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPlanCacheInvalidateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Rol no autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /agent/v2/cache/refresh:
    post:
      tags: [Agent Planning]
      summary: Regenerar entradas de cache del planner v2
      description: >
        Permite precalentar cache para prompts frecuentes. Cada request puede incluir el
        catalogo completo o reutilizar uno ya sincronizado por version. Opcionalmente se
        puede invalidar primero la cache de esas versiones.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentPlanCacheRefreshRequest"
      responses:
        "200":
          description: Cache regenerada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPlanCacheRefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Rol no autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Error del proveedor LLM durante el refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /concerts/{id}:
    get:
      tags: [Concerts]
      summary: Obtener concierto por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Concierto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Concert"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Concerts]
      summary: Actualizar concierto
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConcertUpdateRequest"
      responses:
        "200":
          description: Concierto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Concert"
        "400":
          $ref: "#/components/responses/BadRequest"
    delete:
      tags: [Concerts]
      summary: Eliminar concierto
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Concierto eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    GoogleOAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            openid: OpenID scope
            email: User email
            profile: Basic profile
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Solicitud invalida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: victory-craft-backend
        timestamp:
          type: string
          format: date-time

    AgentParameter:
      type: object
      required: [name, type, description]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, number, boolean, object, array]
        description:
          type: string
        required:
          type: boolean
        enum:
          type: array
          items:
            oneOf:
              - type: string
              - type: number
              - type: boolean

    AgentReturn:
      type: object
      required: [name, type, description]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, number, boolean, object, array]
        description:
          type: string

    AgentAction:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/AgentParameter"
        returns:
          type: array
          items:
            $ref: "#/components/schemas/AgentReturn"
        tags:
          type: array
          items:
            type: string

    AgentPlanRequest:
      type: object
      required: [prompt, currentPath, actions]
      properties:
        prompt:
          type: string
        currentPath:
          type: string
        actions:
          type: array
          items:
            $ref: "#/components/schemas/AgentAction"

    AgentPlanCall:
      type: object
      required: [name, arguments]
      properties:
        name:
          type: string
        arguments:
          type: object
          additionalProperties: true

    AgentPlanResponse:
      type: object
      required: [summary, calls]
      properties:
        summary:
          type: string
        calls:
          type: array
          items:
            $ref: "#/components/schemas/AgentPlanCall"

    NavigationCatalogEntry:
      type: object
      required: [route, actionName, title]
      properties:
        route:
          type: string
        actionName:
          type: string
          example: navigation.go_to
        title:
          type: string
        section:
          type: string
        page:
          type: string
        subpage:
          type: string
        aliases:
          type: array
          items:
            type: string
        breadcrumbs:
          type: array
          items:
            type: string
        parents:
          type: array
          items:
            type: string
        intentTags:
          type: array
          items:
            type: string
        isLanding:
          type: boolean
        popularity:
          type: number

    NavigationCatalog:
      type: object
      required: [version, entries]
      properties:
        version:
          type: string
        locale:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/NavigationCatalogEntry"

    AgentPlanMetaCandidateRoute:
      type: object
      required: [route, score]
      properties:
        route:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1

    AgentPlanMeta:
      type: object
      required: [plannerMode, confidence, traceId]
