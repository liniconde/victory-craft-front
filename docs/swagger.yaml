          nullable: true
        ranking:
          $ref: "#/components/schemas/VideoRankingMetrics"
        myVote:
          type: integer
          enum: [-1, 1]
          nullable: true

    VideoRankingPaginatedResponse:
      type: object
      description: >
        Respuesta paginada del ranking. El backend aplica el orden completo antes de paginar para
        evitar inconsistencias entre paginas. En `sortBy=score` se usa `ranking.score DESC`,
        luego `video.uploadedAt DESC` y finalmente un desempate deterministico por id del video.
        Solo incluye scouting profiles publicados; los videos sin scouting profile y los estados
        `draft` o `archived` quedan fuera.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/VideoRankingItem"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

