          required: false
          schema:
            type: string
          description: Filtra notificaciones de un video concreto
        - in: query
          name: analysisJobId
          required: false
          schema:
            type: string
          description: Filtra notificaciones de un job concreto
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [analysis_queued, analysis_completed, analysis_failed, info]
          description: Filtra por tipo de notificacion
      responses:
        "200":
          description: Lista de notificaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/{id}:
    delete:
      tags: [Users]
      summary: Eliminar notificacion consumida
      parameters:
