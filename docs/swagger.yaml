      summary: Actualizar estadisticas por videoId
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoStatsUpdateRequest"
      responses:
        "200":
          description: Estadisticas actualizadas
          content:
