  /video-stats:
    post:
      tags: [Video Stats]
      summary: Crear o actualizar estadisticas de video (unificado manual/AI)
      description: >
        Acepta payload legacy (`statistics.sportType`) y payload unificado con
        `sportType`, `events`, `teamAName/teamBName`, `teams`, `matchStats`.
        Si hay `events`, el backend recalcula `matchStats` y `teams` para
        mantener consistencia. `matchStats` incluye globales por partido
        (passes, shots, goals, fouls, others) y `teams[].stats` incluye
        estadisticas por equipo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoStatsCreateRequest"
      responses:
        "201":
          description: Estadisticas creadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoStats"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /video-stats/football/videos-with-goals:
