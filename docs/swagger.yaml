              examples:
                default:
                  value:
                    items:
                      - videoId: "67ed8f71cf3e27c5fe0ce245"
                        sportType: "football"
                        teamAName: "Team A"
                        teamBName: "Team B"
                        goals:
                          total: 2
                          teamA: 1
                          teamB: 1
                        summary: "Partido con varias jugadas de gol"
                        updatedAt: "2026-03-05T18:00:00.000Z"
                        video:
                          _id: "67ed8f71cf3e27c5fe0ce245"
                          s3Key: "match-001.mp4"
                          uploadedAt: "2026-03-05T17:30:00.000Z"
                          videoType: "library"
                          videoUrl: "https://victory-craft.s3.amazonaws.com/match-001.mp4?X-Amz-..."
                    pagination:
                      page: 1
                      limit: 20
                      total: 1
                      totalPages: 1
                      hasNextPage: false
                      hasPrevPage: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /video-stats/{videoId}:
    get:
